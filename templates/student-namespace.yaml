apiVersion: v1
kind: Namespace
metadata:
  name: student-${USERNAME}
  labels:
    type: student-workspace
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gpu-quota
  namespace: student-${USERNAME}
spec:
  hard:
    pods: "2"
    requests.cpu: "4"
    requests.memory: "16Gi"
    limits.cpu: "4"
    limits.memory: "16Gi"
    nvidia.com/gpu: "1"
    nvidia.com/gpumem: "8192"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: home
  namespace: student-${USERNAME}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
  storageClassName: local-path
