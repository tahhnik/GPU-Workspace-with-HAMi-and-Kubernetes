apiVersion: v1
kind: Pod
metadata:
  name: workspace
  namespace: student-${USERNAME}
  labels:
    app: workspace
    type: gpu-session
spec:
  runtimeClassName: nvidia
  schedulerName: hami-scheduler
  containers:
  - name: workspace
    image: nvcr.io/nvidia/pytorch:24.01-py3
    command: ["sleep", "infinity"]
    resources:
      limits:
        nvidia.com/gpu: 1
        nvidia.com/gpumem: 8192
        memory: "8Gi"
        cpu: "2"
      requests:
        nvidia.com/gpu: 1
        nvidia.com/gpumem: 8192
        memory: "4Gi"
        cpu: "1"
    volumeMounts:
    - name: home
      mountPath: /home/student
    - name: dshm
      mountPath: /dev/shm
  volumes:
  - name: home
    persistentVolumeClaim:
      claimName: home
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: "2Gi"
  restartPolicy: Never
